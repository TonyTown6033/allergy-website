name: Auto-update submodules

on:
  repository_dispatch:
    types: [submodule-updated]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out root repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULES_TOKEN }}
          submodules: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update submodule
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --remote new-api

      - name: Commit and push if changed
        run: |
          git add new-api
          if git diff --staged --quiet; then
            echo "No submodule changes, skipping."
          else
            SHA=$(git -C new-api rev-parse --short HEAD)
            git commit -m "chore: auto-update new-api submodule to ${SHA}"
            git push origin main
          fi
